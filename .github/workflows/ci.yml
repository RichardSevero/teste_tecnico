name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: santa_casa_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, mbstring, bcmath
          coverage: none

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist

      - name: Instalar dependencias front-end
        run: npm ci

      - name: Validar padrao de codigo com Pint
        run: vendor/bin/pint --test

      - name: Preparar ambiente de teste
        run: |
          cp .env.testing.example .env.testing
          php artisan key:generate --env=testing

      - name: Rodar testes
        run: php artisan test

      - name: Validar build do front
        run: npm run build
